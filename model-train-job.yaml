apiVersion: batch/v1
kind: Job
metadata:
  name: mri-train-pipeline
  namespace: kc-ai-research-lab
spec:
  backoffLimit: 0

  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-RTX-5000-Ada-Generation # Or adjust to any available GPU

      containers:
        - name: pipeline
          image: pytorch/pytorch:2.2.0-cuda12.1-cudnn8-runtime

          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              echo "=========================================="
              echo "  Cloning repository"
              echo "=========================================="
              apt-get update -qq && apt-get install -y -qq git
              
              # TODO: Update this link once you push the code to your GitHub repo
              REPO_URL="https://github.com/utsabshrestha/BrainTumorMRIDataset.git"
              
              git clone \
                --branch main \
                --single-branch \
                $REPO_URL \
                /mri-project
              
              cd /mri-project

              echo "=========================================="
              echo "  Installing requirements"
              echo "=========================================="
              pip install -r requirements.txt --quiet
              nvidia-smi

              set +e

              MODELS="resnet50_scratch resnet50_pretrained vit_small_scratch vit_small_pretrained"
              SEED=42
              PASS=0
              FAIL=0

              DATA_DIR="/pvc/utsab/data"
              CKPT_DIR="/pvc/utsab/checkpoints"
              RESULTS_DIR="/pvc/utsab/results"
              
              mkdir -p "$CKPT_DIR" "$RESULTS_DIR"

              for MODEL in $MODELS; do
                echo ""
                echo "============================================================"
                echo "  Training MODEL=$MODEL  SEED=$SEED"
                echo "============================================================"

                python -u train.py \
                  --model    $MODEL \
                  --data_dir $DATA_DIR \
                  --ckpt_dir $CKPT_DIR \
                  --epochs   30 \
                  --batch    32 \
                  --workers  4 \
                  --seed     $SEED
                
                TRAIN_STATUS=$?

                if [ $TRAIN_STATUS -ne 0 ]; then
                  echo "  [ERROR] Training failed — skipping eval."
                  FAIL=$((FAIL + 1))
                  continue
                fi

                echo ""
                echo "============================================================"
                echo "  Evaluating MODEL=$MODEL  SEED=$SEED"
                echo "============================================================"

                python -u eval.py \
                  --model       $MODEL \
                  --data_dir    $DATA_DIR \
                  --ckpt_dir    $CKPT_DIR \
                  --results_dir $RESULTS_DIR \
                  --batch       32 \
                  --workers     4 \
                  --seed        $SEED
                  
                EVAL_STATUS=$?

                if [ $EVAL_STATUS -ne 0 ]; then
                  echo "  [WARN] Eval failed for $MODEL"
                  FAIL=$((FAIL + 1))
                else
                  PASS=$((PASS + 1))
                  echo "  [OK] $MODEL done."
                fi
              done

              echo ""
              echo "============================================================"
              echo "  Pipeline complete.  Passed: $PASS   Failed: $FAIL"
              echo "============================================================"
              ls -l $RESULTS_DIR

          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"

          env:
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            - name: PYTHONUNBUFFERED
              value: "1"

          volumeMounts:
            - name: data
              mountPath: /pvc
            - name: shm
              mountPath: /dev/shm

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: shape-resnet-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi

      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
